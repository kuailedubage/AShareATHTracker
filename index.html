// ===== UTILITIES =====
const C={cyan:'#00fff2',mag:'#ff00ff',purple:'#7b2ff7',pink:'#ff6bda',gold:'#ffd700',green:'#00cc66',red:'#ff4444',bg:'#0a0a1a',bg2:'#0f0f2a',bg3:'#141438',text:'#e0e0ff',text2:'#8888aa'};
const fmt=(v,d=2)=>typeof v==='number'?v.toFixed(d):v||'-';
const pct=(v)=>{if(typeof v!=='number')return'-';const s=v.toFixed(2);return v>=0?`<span class="pos">+${s}%</span>`:`<span class="neg">${s}%</span>`};
const boardTag=(b)=>{const m={'主板':'tag-main','创业板':'tag-gem','科创板':'tag-star'};return `<span class="tag ${m[b]||'tag-main'}">${b}</span>`};

// ===== KPI CARDS =====
function renderKPI(){
  const avgScore=(DATA.reduce((a,d)=>a+d.strength_score,0)/DATA.length).toFixed(1);
  const avgPullback=(DATA.reduce((a,d)=>a+d.pullback_pct,0)/DATA.length).toFixed(2);
  const avgGain924=(DATA.reduce((a,d)=>a+d.gain_since_924,0)/DATA.length).toFixed(1);
  const maxConsec=Math.max(...DATA.map(d=>d.consecutive_new_high_days));
  const kpis=[
    {label:'创新高个股',value:DATA.length,unit:'只',color:C.cyan,icon:'◉'},
    {label:'平均强度评分',value:avgScore,unit:'/100',color:C.cyan,icon:'◈'},
    {label:'平均回落幅度',value:avgPullback,unit:'%',color:C.green,icon:'▾'},
    {label:'924以来平均涨幅',value:avgGain924,unit:'%',color:C.red,icon:'▴'},
  ];
  const el=document.getElementById('kpiCards');
  el.innerHTML=kpis.map(k=>`
    <div class="card stat-card p-6 text-center">
      <div class="text-3xl mb-1" style="color:${k.color}">${k.icon}</div>
      <div class="text-3xl md:text-4xl font-black mono" style="color:${k.color}">${k.value}</div>
      <div class="text-xs text-gray-500 mt-1 mono">${k.unit}</div>
      <div class="text-sm text-gray-400 mt-2">${k.label}</div>
    </div>
  `).join('');

  // Secondary stats
  const boards={};DATA.forEach(d=>{boards[d.board]=(boards[d.board]||0)+1});
  const industries={};DATA.forEach(d=>{const ind=d.industry.split('/')[0];industries[ind]=(industries[ind]||0)+1});
  const topIndustry=Object.entries(industries).sort((a,b)=>b[1]-a[1])[0];
  const avgTurnover=(DATA.reduce((a,d)=>a+d.turnover,0)/DATA.length).toFixed(1);
  const totalMcap=(DATA.reduce((a,d)=>a+d.market_cap,0)).toFixed(0);

  const sec=[
    {label:'最多连续新高',value:maxConsec+'天',color:C.cyan},
    {label:'主板',value:(boards['主板']||0)+'只',color:C.cyan},
    {label:'创业板',value:(boards['创业板']||0)+'只',color:C.mag},
    {label:'最热行业',value:topIndustry?topIndustry[0]:'',color:C.purple},
    {label:'平均换手率',value:avgTurnover+'%',color:C.pink},
    {label:'总市值',value:totalMcap+'亿',color:C.gold},
  ];
  document.getElementById('secondaryStats').innerHTML=sec.map(s=>`
    <div class="card p-3 text-center">
      <div class="text-lg font-bold mono" style="color:${s.color}">${s.value}</div>
      <div class="text-xs text-gray-500 mt-1">${s.label}</div>
    </div>
  `).join('');
}

// ===== ECHARTS THEME =====
const eTheme={backgroundColor:'transparent',textStyle:{fontFamily:'Inter,sans-serif',color:'#8888aa'},title:{textStyle:{color:'#e0e0ff',fontWeight:700,fontSize:15}},tooltip:{backgroundColor:'rgba(10,10,26,.95)',borderColor:'rgba(0,255,242,.2)',textStyle:{color:'#e0e0ff',fontFamily:'JetBrains Mono,monospace',fontSize:12}},legend:{textStyle:{color:'#8888aa'}},grid:{containLabel:true}};

function initChart(id){const el=document.getElementById(id);if(!el)return null;const c=echarts.init(el,null,{renderer:'svg'});return c;}

// ===== TREEMAP (Concept/Theme Distribution) =====
function renderTreemap(){
  const c=initChart('treemapChart');if(!c)return;
  const conceptMap={};
  DATA.forEach(d=>{
    if(!d.concept)return;
    d.concept.split('/').forEach(tag=>{
      tag=tag.trim();if(!tag)return;
      if(!conceptMap[tag])conceptMap[tag]={count:0,stockDetails:[],totalChg:0,totalScore:0};
      conceptMap[tag].count++;
      conceptMap[tag].stockDetails.push({name:d.name,chg:d.change_pct,score:d.strength_score});
      conceptMap[tag].totalChg+=d.change_pct;
      conceptMap[tag].totalScore+=d.strength_score;
    });
  });
  // Color helper: map avgChg to red/green
  function chgColor(avg){
    if(avg>=0){const t=Math.min(avg/12,1);const r=Math.round(120+135*t);const g=Math.round(60*(1-t));return `rgb(${r},${g},${Math.round(30*(1-t))})`}
    else{const t=Math.min(Math.abs(avg)/12,1);const g=Math.round(100+155*t);const r=Math.round(60*(1-t));return `rgb(${r},${g},${Math.round(30*(1-t))})`}
  }
  const treeData=Object.entries(conceptMap)
    .sort((a,b)=>b[1].count-a[1].count)
    .map(([tag,info])=>{
      const avgChg=+(info.totalChg/info.count).toFixed(2);
      const avgScore=+(info.totalScore/info.count).toFixed(1);
      return {name:tag,value:info.count,avgChg,avgScore,
        stockDetails:info.stockDetails,
        itemStyle:{color:chgColor(avgChg)}}
    });
  c.setOption({...eTheme,title:{text:'题材概念热力矩阵',subtext:'面积=出现次数 · 颜色=平均涨跌幅（红涨绿跌）',left:'center',...eTheme.title,subtextStyle:{color:'#666'}},tooltip:{...eTheme.tooltip,formatter:p=>{const d=p.data;if(!d.stockDetails)return d.name;const list=d.stockDetails.map(s=>`<span style="color:${s.chg>=0?'#ff4444':'#00cc66'}">${s.name} ${s.chg>=0?'+':''}${s.chg.toFixed(2)}%</span> 强度:${s.score}`).join('<br>');return `<div style="font-size:14px;font-weight:700;margin-bottom:4px;color:${C.cyan}">${d.name}</div><div>数量: <b>${d.value}</b>只 · 平均涨幅: <span style="color:${d.avgChg>=0?'#ff4444':'#00cc66'}">${d.avgChg>=0?'+':''}${d.avgChg}%</span></div><div style="margin-top:4px;font-size:11px;line-height:1.6">${list}</div>`}},series:[{type:'treemap',roam:false,nodeClick:false,width:'95%',height:'85%',top:55,breadcrumb:{show:false},data:treeData,label:{show:true,formatter:p=>{const avg=p.data.avgChg;return `${p.name}\n${avg>=0?'+':''}${avg}%`},fontSize:12,color:'#e0e0ff',fontWeight:600,lineHeight:18},itemStyle:{borderRadius:4,borderColor:'rgba(255,255,255,.15)',borderWidth:2,gapWidth:3},levels:[{itemStyle:{gapWidth:3,borderWidth:2}}]}]});
  return c;
}

// ===== MARKET CAP DISTRIBUTION =====
function renderMcapDist(){
  const c=initChart('mcapDistChart');if(!c)return;
  // Buckets: <100亿, 100-300亿, 300-1000亿, >1000亿
  const buckets=[
    {label:'<100亿\n(小盘)',min:0,max:100,count:0,stocks:[]},
    {label:'100-300亿\n(中盘)',min:100,max:300,count:0,stocks:[]},
    {label:'300-1000亿\n(中大盘)',min:300,max:1000,count:0,stocks:[]},
    {label:'>1000亿\n(大盘)',min:1000,max:Infinity,count:0,stocks:[]}
  ];
  DATA.forEach(d=>{
    for(const b of buckets){
      if(d.market_cap>=b.min && d.market_cap<b.max){b.count++;b.stocks.push(d.name+'('+d.market_cap.toFixed(0)+'亿)');break;}

let sortCol=null,sortDir=1,filterBoard='all',searchTerm='';

function renderTable(){
  const head=document.getElementById('tableHead');
  head.innerHTML=TABLE_COLS.map((col,i)=>`<th data-idx="${i}">${col.label}</th>`).join('');

  head.querySelectorAll('th').forEach(th=>{
    th.addEventListener('click',()=>{
      const idx=+th.dataset.idx;
      if(sortCol===idx){sortDir*=-1}else{sortCol=idx;sortDir=-1}
      head.querySelectorAll('th').forEach(t=>t.className='');
      th.className=sortDir>0?'sorted-asc':'sorted-desc';
      fillTable();
    });
  });
  // Default sort by strength
  sortCol=TABLE_COLS.findIndex(c=>c.key==='strength_score');
  sortDir=-1;
  head.querySelector(`th[data-idx="${sortCol}"]`).className='sorted-desc';
  fillTable();
}

function fillTable(){
  let filtered=[...DATA];
  if(filterBoard!=='all')filtered=filtered.filter(d=>d.board===filterBoard);
  if(searchTerm){
    const t=searchTerm.toLowerCase();
    filtered=filtered.filter(d=>
      d.code.includes(t)||d.name.toLowerCase().includes(t)||
      d.industry.toLowerCase().includes(t)||d.concept.toLowerCase().includes(t)
    );
  }
  if(sortCol!==null){
    const key=TABLE_COLS[sortCol].key;
    filtered.sort((a,b)=>{
      let va=a[key],vb=b[key];
      if(typeof va==='string')return sortDir*(va.localeCompare(vb));
      return sortDir*((va||0)-(vb||0));
    });
  }
  const body=document.getElementById('tableBody');
  body.innerHTML=filtered.map(d=>
    `<tr>${TABLE_COLS.map(col=>{
      const v=d[col.key];
      return `<td>${col.fmt?col.fmt(v):(v??'-')}</td>`;
    }).join('')}</tr>`
  ).join('');
  document.getElementById('tableCount').textContent=`显示 ${filtered.length} / ${DATA.length} 条`;
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  renderKPI();
  const charts=[renderTreemap(),renderBoardPie(),renderMcapDist(),renderConceptBar(),renderStrengthBar(),renderBubble(),renderGainCompare(),renderTurnoverScatter(),renderRadar(),renderRiskReward()].filter(Boolean);
  renderTable();

  // Search & filter
  document.getElementById('searchInput').addEventListener('input',e=>{searchTerm=e.target.value;fillTable()});
  document.querySelectorAll('.board-filter').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.board-filter').forEach(b=>b.style.opacity='.5');
      btn.style.opacity='1';
      filterBoard=btn.dataset.board;
      fillTable();
    });
  });

  // Resize
  window.addEventListener('resize',()=>charts.forEach(c=>c&&c.resize()));

  // Progress bar
  const pb=document.getElementById('progressBar');
  window.addEventListener('scroll',()=>{
    const h=document.documentElement.scrollHeight-window.innerHeight;
    const p=h>0?window.scrollY/h:0;
    pb.style.transform=`scaleX(${p})`;
  });

  // GSAP ScrollTrigger animations
  gsap.registerPlugin(ScrollTrigger);
  gsap.utils.toArray('.section').forEach(el=>{
    gsap.to(el,{opacity:1,y:0,duration:0.8,ease:'power2.out',scrollTrigger:{trigger:el,start:'top 85%',toggleActions:'play none none none'}});
  });

  // Hero parallax
  gsap.to('#hero',{yPercent:20,ease:'none',scrollTrigger:{trigger:'#hero',start:'top top',end:'bottom top',scrub:true}});
});
</script>
