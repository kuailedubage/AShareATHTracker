name: Daily A-Share ATH Scan

on:
  # 每个交易日收盘后运行 (15:30 CST = 07:30 UTC)
  schedule:
    - cron: '5 * * * 1-5'  # 周一到周五
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-scan
  cancel-in-progress: true

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 用 Actions cache 持久化历史新高缓存文件，避免每次全量拉取
      - name: Restore ATH cache
        uses: actions/cache@v4
        with:
          path: historical_highs.json
          key: ath-cache-${{ github.run_number }}
          restore-keys: |
            ath-cache-

      - name: Run ATH scanner
        run: python fetch_data.py
        timeout-minutes: 30

      - name: Generate report
        run: python generate_report.py

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save generated files
          cp index.html /tmp/index.html
          cp new_high_stocks.json /tmp/new_high_stocks.json

          # Switch to gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # Update files
          cp /tmp/index.html index.html
          cp /tmp/new_high_stocks.json new_high_stocks.json

          git add index.html new_high_stocks.json
          git diff --staged --quiet || git commit -m "data: $(date +%Y-%m-%d) ATH scan results"
          git push origin gh-pages
