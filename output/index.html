// ===== UTILITIES =====
const C={cyan:'#00fff2',mag:'#ff00ff',purple:'#7b2ff7',pink:'#ff6bda',gold:'#ffd700',green:'#00cc66',red:'#ff4444',bg:'#0a0a1a',bg2:'#0f0f2a',bg3:'#141438',text:'#e0e0ff',text2:'#8888aa'};
const fmt=(v,d=2)=>typeof v==='number'?v.toFixed(d):v||'-';
const pct=(v)=>{if(typeof v!=='number')return'-';const s=v.toFixed(2);return v>=0?`<span class="pos">+${s}%</span>`:`<span class="neg">${s}%</span>`};
const boardTag=(b)=>{const m={'主板':'tag-main','创业板':'tag-gem','科创板':'tag-star','北交所':'tag-bse'};return `<span class="tag ${m[b]||'tag-main'}">${b}</span>`};

// ===== KPI CARDS =====
function renderKPI(){
  const avgScore=(DATA.reduce((a,d)=>a+d.strength_score,0)/DATA.length).toFixed(1);
  const avgPullback=(DATA.reduce((a,d)=>a+d.pullback_pct,0)/DATA.length).toFixed(2);
  const avgGain924=(DATA.reduce((a,d)=>a+d.gain_since_924,0)/DATA.length).toFixed(1);
  const maxConsec=Math.max(...DATA.map(d=>d.consecutive_new_high_days));
  const kpis=[
    {label:'创新高个股',value:DATA.length,unit:'只',color:C.cyan,icon:'◉'},
    {label:'平均强度评分',value:avgScore,unit:'/100',color:C.cyan,icon:'◈'},
    {label:'平均回落幅度',value:avgPullback,unit:'%',color:C.green,icon:'▾'},
    {label:'924以来平均涨幅',value:avgGain924,unit:'%',color:C.red,icon:'▴'},
  ];
  const el=document.getElementById('kpiCards');
  el.innerHTML=kpis.map(k=>`
    <div class="card stat-card p-6 text-center">
      <div class="text-3xl mb-1" style="color:${k.color}">${k.icon}</div>
      <div class="text-3xl md:text-4xl font-black mono" style="color:${k.color}">${k.value}</div>
      <div class="text-xs text-gray-500 mt-1 mono">${k.unit}</div>
      <div class="text-sm text-gray-400 mt-2">${k.label}</div>
    </div>
  `).join('');

  // Secondary stats
  const boards={};DATA.forEach(d=>{boards[d.board]=(boards[d.board]||0)+1});
  const industries={};DATA.forEach(d=>{const ind=d.industry.split('/')[0];industries[ind]=(industries[ind]||0)+1});
  const topIndustry=Object.entries(industries).sort((a,b)=>b[1]-a[1])[0];
  const avgTurnover=(DATA.reduce((a,d)=>a+d.turnover,0)/DATA.length).toFixed(1);
  const totalMcap=(DATA.reduce((a,d)=>a+d.market_cap,0)).toFixed(0);

  const sec=[
    {label:'最多连续新高',value:maxConsec+'天',color:C.cyan},
    {label:'主板',value:(boards['主板']||0)+'只',color:C.cyan},
    {label:'创业板',value:(boards['创业板']||0)+'只',color:C.mag},
    {label:'最热行业',value:topIndustry?topIndustry[0]:'',color:C.purple},
    {label:'平均换手率',value:avgTurnover+'%',color:C.pink},
    {label:'总市值',value:totalMcap+'亿',color:C.gold},
  ];
  document.getElementById('secondaryStats').innerHTML=sec.map(s=>`
    <div class="card p-3 text-center">
      <div class="text-lg font-bold mono" style="color:${s.color}">${s.value}</div>
      <div class="text-xs text-gray-500 mt-1">${s.label}</div>
    </div>
  `).join('');
}

function initChart(id){const el=document.getElementById(id);if(!el)return null;const c=echarts.init(el,null,{renderer:'svg'});return c;}

// ===== TREEMAP =====
function renderTreemap(){
  const c=initChart('treemapChart');if(!c)return;
  const byIndustry={};DATA.forEach(d=>{const ind=d.industry;if(!byIndustry[ind])byIndustry[ind]=[];byIndustry[ind].push(d)});
  const treeData=Object.entries(byIndustry).map(([ind,stocks])=>({
    name:ind,
    children:stocks.map(s=>({name:s.name,value:s.market_cap,changePct:s.change_pct,score:s.strength_score,code:s.code}))
  }));
  c.setOption({...eTheme,title:{text:'行业热力矩阵',subtext:'面积=市值 · 颜色=涨跌幅 (红涨绿跌)',left:'center',...eTheme.title,subtextStyle:{color:'#666'}},tooltip:{...eTheme.tooltip,formatter:p=>{const d=p.data;return d.code?`<div style="font-size:14px;font-weight:700;margin-bottom:4px">${d.name} <span style="color:#666">${d.code}</span></div><div>市值: ${d.value}亿</div><div>涨跌: <span style="color:${d.changePct>=0?C.red:C.green}">${d.changePct>=0?'+':''}${d.changePct}%</span></div><div>强度: ${d.score}</div>`:d.name}},series:[{type:'treemap',roam:false,nodeClick:false,width:'95%',height:'85%',top:60,breadcrumb:{show:false},levels:[{itemStyle:{borderColor:'rgba(0,255,242,.15)',borderWidth:2,gapWidth:3},upperLabel:{show:true,height:28,color:'#e0e0ff',fontSize:12,fontWeight:600,backgroundColor:'rgba(10,10,26,.7)',padding:[4,8]}},{itemStyle:{borderColor:'rgba(255,255,255,.05)',borderWidth:1,gapWidth:1},colorMappingBy:'value'}],data:treeData,label:{show:true,formatter:'{b}',fontSize:11,color:'#e0e0ff'},itemStyle:{borderRadius:3},visualMin:-5,visualMax:20,visualDimension:function(){return 0}(),levels:[{itemStyle:{borderColor:'rgba(0,255,242,.2)',borderWidth:2,gapWidth:4},upperLabel:{show:true,height:26,backgroundColor:'rgba(20,20,56,.8)',color:'#e0e0ff',fontSize:11,fontWeight:600,padding:[2,6]}},{colorSaturation:[.3,.8],itemStyle:{borderColorSaturation:.5,gapWidth:2,borderWidth:1}}],color:['#00cc66','#338855','#555555','#884433','#cc4444','#ff4444','#ff2222']}]});
  return c;
}

  c.setOption({...eTheme,title:{text:'换手率 × 新高后回落幅度',left:'center',...eTheme.title},tooltip:{...eTheme.tooltip,formatter:p=>{const d=p.data;return `<div style="font-weight:700">${d[3]}</div><div>换手率: ${d[0]}%</div><div>回落: ${d[1]}%</div><div>涨跌幅: <span style="color:${d[4]>=0?'#ff4444':'#00cc66'}">${d[4]>=0?'+':''}${d[4]}%</span></div>`}},grid:{left:60,right:30,top:50,bottom:50},xAxis:{name:'换手率%',nameTextStyle:{color:'#666'},type:'value',axisLine:{lineStyle:{color:'rgba(255,255,255,.1)'}},axisLabel:{color:'#666'},splitLine:{lineStyle:{color:'rgba(255,255,255,.04)'}}},yAxis:{name:'新高后回落%',nameTextStyle:{color:'#666'},type:'value',inverse:true,axisLine:{lineStyle:{color:'rgba(255,255,255,.1)'}},axisLabel:{color:'#666'},splitLine:{lineStyle:{color:'rgba(255,255,255,.04)'}}},series:[{type:'scatter',symbolSize:18,data:DATA.map(d=>[d.turnover,d.pullback_pct,d.market_cap,d.name,d.change_pct]),itemStyle:{color:p=>p.data[4]>=0?C.red:C.green,shadowBlur:8,shadowColor:'rgba(0,255,242,.2)'},emphasis:{itemStyle:{shadowBlur:20}},label:{show:true,formatter:p=>p.data[3],fontSize:9,color:'#aaa',position:'right'}}]});
  return c;

// ===== DATA TABLE =====

  {key:'code',label:'代码',fmt:v=>`<span class="mono" style="color:${C.cyan}">${v}</span>`},
  {key:'name',label:'名称',fmt:v=>`<span style="font-weight:600">${v}</span>`},
  {key:'board',label:'板块',fmt:v=>boardTag(v)},
  {key:'industry',label:'行业'},
  {key:'concept',label:'核心概念',fmt:v=>`<span style="font-size:11px;color:#aaa;max-width:180px;display:inline-block;overflow:hidden;text-overflow:ellipsis" title="${v}">${v}</span>`},
  {key:'today_high',label:'今日最高',fmt:v=>`<span class="mono">${fmt(v)}</span>`},
  {key:'now_price',label:'收盘价',fmt:v=>`<span class="mono" style="font-weight:600">${fmt(v)}</span>`},
  {key:'change_pct',label:'涨跌%',fmt:v=>pct(v),sort:'num'},
  {key:'pullback_pct',label:'新高回落%',fmt:v=>`<span class="mono" style="color:#00cc66">${fmt(v)}%</span>`,sort:'num'},
  {key:'consecutive_new_high_days',label:'连续新高(日高)',fmt:v=>`<span class="mono" style="color:${C.cyan}">${v}天</span>`,sort:'num'},
  {key:'true_consecutive_ath_days',label:'连续历史新高天数',fmt:v=>`<span class="mono" style="color:${C.mag}">${v}天</span>`,sort:'num'},
  {key:'days_since_prev_ath',label:'距上次新高(天)',fmt:v=>{const clr=v>500?'#ff4444':v>100?'#ff8800':v>30?'#ffcc00':'#aaaaaa';return `<span class="mono" style="color:${clr};font-weight:600">${v}</span>`},sort:'num'},
  {key:'longest_daily_higher_high',label:'最长连涨天数',fmt:v=>`<span class="mono" style="color:${C.cyan}">${v}天</span>`,sort:'num'},
  {key:'broke_ma5_after_ath',label:'新高后破5日线',fmt:v=>v?`<span style="color:#ff4444;font-weight:700">✓</span>`:`<span style="color:#00cc66;font-weight:700">✗</span>`},
  {key:'broke_ma10_after_ath',label:'新高后破10日线',fmt:v=>v?`<span style="color:#ff4444;font-weight:700">✓</span>`:`<span style="color:#00cc66;font-weight:700">✗</span>`},
  {key:'broke_ma20_after_ath',label:'新高后破20日线',fmt:v=>v?`<span style="color:#ff4444;font-weight:700">✓</span>`:`<span style="color:#00cc66;font-weight:700">✗</span>`},
  {key:'ma5_deviation',label:'MA5偏离%',fmt:v=>pct(v),sort:'num'},

  {key:'drop_to_break_ma5',label:'跌破MA5需跌',fmt:v=>`<span class="mono" style="color:#00cc66">${fmt(v)}%</span>`,sort:'num'},
  {key:'prev_ath_date',label:'新高日期'},
  {key:'turnover',label:'换手率%',fmt:v=>`<span class="mono">${fmt(v)}</span>`,sort:'num'},
  {key:'ipo_price',label:'发行价',fmt:v=>`<span class="mono">${fmt(v)}</span>`,sort:'num'},

  {key:'strength_score',label:'强度',fmt:v=>{const clr=v>65?C.cyan:v>45?'#ff4444':C.mag;return `<span class="mono" style="color:${clr};font-weight:700">${fmt(v,1)}</span>`},sort:'num'},
];

let sortCol=null,sortDir=1,filterBoard='all',searchTerm='';

function renderTable(){
  const head=document.getElementById('tableHead');
  head.innerHTML=TABLE_COLS.map((col,i)=>`<th data-idx="${i}">${col.label}</th>`).join('');

  head.querySelectorAll('th').forEach(th=>{
    th.addEventListener('click',()=>{
      const idx=+th.dataset.idx;
      if(sortCol===idx){sortDir*=-1}else{sortCol=idx;sortDir=-1}
      head.querySelectorAll('th').forEach(t=>t.className='');
      th.className=sortDir>0?'sorted-asc':'sorted-desc';
      fillTable();
    });
  });
  // Default sort by strength
  sortCol=TABLE_COLS.findIndex(c=>c.key==='strength_score');
  sortDir=-1;
  head.querySelector(`th[data-idx="${sortCol}"]`).className='sorted-desc';
  fillTable();
}

function fillTable(){
  let filtered=[...DATA];
  if(filterBoard!=='all')filtered=filtered.filter(d=>d.board===filterBoard);
  if(searchTerm){
    const t=searchTerm.toLowerCase();
    filtered=filtered.filter(d=>
      d.code.includes(t)||d.name.toLowerCase().includes(t)||
      d.industry.toLowerCase().includes(t)||d.concept.toLowerCase().includes(t)
    );
  }
  if(sortCol!==null){
    const key=TABLE_COLS[sortCol].key;
    filtered.sort((a,b)=>{
      let va=a[key],vb=b[key];
      if(typeof va==='string')return sortDir*(va.localeCompare(vb));
      return sortDir*((va||0)-(vb||0));
    });
  }
  const body=document.getElementById('tableBody');
  body.innerHTML=filtered.map(d=>
    `<tr>${TABLE_COLS.map(col=>{
      const v=d[col.key];
      return `<td>${col.fmt?col.fmt(v):(v??'-')}</td>`;
    }).join('')}</tr>`
  ).join('');
  document.getElementById('tableCount').textContent=`显示 ${filtered.length} / ${DATA.length} 条`;
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  renderKPI();
  const charts=[renderTreemap(),renderBoardPie(),renderStrengthBar(),renderBubble(),renderGainCompare(),renderTurnoverScatter(),renderRadar(),renderRiskReward()].filter(Boolean);
  renderTable();

  // Search & filter
  document.getElementById('searchInput').addEventListener('input',e=>{searchTerm=e.target.value;fillTable()});
  document.querySelectorAll('.board-filter').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.board-filter').forEach(b=>b.style.opacity='.5');
      btn.style.opacity='1';
      filterBoard=btn.dataset.board;
      fillTable();
    });
  });

  // Resize
  window.addEventListener('resize',()=>charts.forEach(c=>c&&c.resize()));

  // Progress bar
  const pb=document.getElementById('progressBar');
  window.addEventListener('scroll',()=>{
    const h=document.documentElement.scrollHeight-window.innerHeight;
    const p=h>0?window.scrollY/h:0;
    pb.style.transform=`scaleX(${p})`;
  });

  // GSAP ScrollTrigger animations
  gsap.registerPlugin(ScrollTrigger);
  gsap.utils.toArray('.section').forEach(el=>{
    gsap.to(el,{opacity:1,y:0,duration:0.8,ease:'power2.out',scrollTrigger:{trigger:el,start:'top 85%',toggleActions:'play none none none'}});
  });

  // Hero parallax
  gsap.to('#hero',{yPercent:20,ease:'none',scrollTrigger:{trigger:'#hero',start:'top top',end:'bottom top',scrub:true}});
});
</script>
